<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Dashboard - Yakkai Neri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="js/wellness.js"></script>
</head>
<body class="min-h-screen flex flex-col bg-gray-50">
    <!-- Navigation (same as other pages) -->
    <nav class="fixed w-full bg-white bg-opacity-90 z-50 border-b border-gray-200 shadow-sm">
        <!-- ... navigation content ... -->
    </nav>

    <main class="flex-grow pt-16" id="wellness-dashboard">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-8">Wellness Assessment Dashboard</h1>

            <!-- Summary Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="text-lg font-semibold text-gray-700 mb-2">Total Submissions</h3>
                    <p class="text-3xl font-bold text-green-600" id="total-submissions">0</p>
                </div>
                
                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="text-lg font-semibold text-gray-700 mb-2">Average Stress Level</h3>
                    <p class="text-3xl font-bold text-green-600" id="avg-stress">-</p>
                </div>
                
                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="text-lg font-semibold text-gray-700 mb-2">Participation Rate</h3>
                    <p class="text-3xl font-bold text-green-600" id="participation-rate">-</p>
                </div>
            </div>

            <!-- Charts Section -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Physical Health Chart -->
                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="text-lg font-semibold text-gray-700 mb-4">Physical Health Metrics</h3>
                    <canvas id="physicalHealthChart"></canvas>
                </div>

                <!-- Emotional Health Chart -->
                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="text-lg font-semibold text-gray-700 mb-4">Emotional Wellbeing Metrics</h3>
                    <canvas id="emotionalHealthChart"></canvas>
                </div>
            </div>

            <!-- Recent Submissions Table -->
            <div class="mt-8 bg-white rounded-lg shadow">
                <div class="p-6">
                    <h3 class="text-lg font-semibold text-gray-700 mb-4">Recent Submissions</h3>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead>
                                <tr>
                                    <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                                    <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Designation</th>
                                    <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200" id="recent-submissions">
                                <!-- Dynamically populated -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white py-12 border-t border-gray-200">
        <!-- ... footer content ... -->
    </footer>

    <script>
        // Initialize charts when the page loads
        document.addEventListener('DOMContentLoaded', function() {
            // Physical Health Chart Configuration
            const physicalCtx = document.getElementById('physicalHealthChart').getContext('2d');
            new Chart(physicalCtx, {
                type: 'bar',
                data: {
                    labels: ['Back Pain', 'Neck Pain', 'Break Time', 'Sleep', 'Wrist Pain', 'Screen Breaks'],
                    datasets: [{
                        label: 'Average Score',
                        data: [0, 0, 0, 0, 0, 0],
                        backgroundColor: 'rgba(16, 185, 129, 0.5)',
                        borderColor: 'rgb(16, 185, 129)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 4
                        }
                    }
                }
            });

            // Emotional Health Chart Configuration
            const emotionalCtx = document.getElementById('emotionalHealthChart').getContext('2d');
            new Chart(emotionalCtx, {
                type: 'radar',
                data: {
                    labels: ['Morning Energy', 'Afternoon Energy', 'Deadline Response', 'End Day Mood', 'Relaxation', 'Mental Clarity'],
                    datasets: [{
                        label: 'Average Score',
                        data: [0, 0, 0, 0, 0, 0],
                        backgroundColor: 'rgba(16, 185, 129, 0.2)',
                        borderColor: 'rgb(16, 185, 129)',
                        pointBackgroundColor: 'rgb(16, 185, 129)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgb(16, 185, 129)'
                    }]
                },
                options: {
                    elements: {
                        line: {
                            borderWidth: 3
                        }
                    },
                    scales: {
                        r: {
                            angleLines: {
                                display: true
                            },
                            suggestedMin: 0,
                            suggestedMax: 4
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
