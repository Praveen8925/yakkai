version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: yakkai_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secure_password_change_this}
      MYSQL_DATABASE: ${DB_NAME:-yakkai_neri}
      MYSQL_USER: ${DB_USER:-yakkai_user}
      MYSQL_PASSWORD: ${DB_PASS:-yakkai_password_change_this}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-3307}:3306"
    networks:
      - yakkai_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secure_password_change_this}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # PHP Backend + React Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yakkai_web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Database Configuration
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-yakkai_neri}
      DB_USER: ${DB_USER:-yakkai_user}
      DB_PASS: ${DB_PASS:-yakkai_password_change_this}
      
      # JWT Configuration (CHANGE THESE IN PRODUCTION!)
      JWT_SECRET: ${JWT_SECRET:-please_generate_a_secure_random_64_char_string_here}
      JWT_EXPIRY: ${JWT_EXPIRY:-86400}
      
      # Application Configuration
      APP_ENV: ${APP_ENV:-production}
      APP_URL: ${APP_URL:-http://localhost}
      
      # PHP Configuration
      PHP_MEMORY_LIMIT: 256M
      PHP_UPLOAD_MAX_FILESIZE: 10M
      PHP_POST_MAX_SIZE: 10M
    volumes:
      # Persistent uploads
      - uploads_data:/var/www/html/frontend/public/uploads
      - backend_uploads:/var/www/html/backend/uploads
      # Logs
      - logs_data:/var/www/html/backend/logs
      # Mount .env file (create from .env.example)
      - ./backend/.env:/var/www/html/backend/.env:ro
    ports:
      - "${WEB_PORT:-8000}:80"
    networks:
      - yakkai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # phpMyAdmin (Optional - for database management)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: yakkai_phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-yakkai_user}
      PMA_PASSWORD: ${DB_PASS:-yakkai_password_change_this}
      UPLOAD_LIMIT: 10M
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    networks:
      - yakkai_network
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

networks:
  yakkai_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
  backend_uploads:
    driver: local
  logs_data:
    driver: local
